<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAI Enterprises — Login</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); min-height:100vh; display:flex; align-items:center; justify-content:center; font-family:'Segoe UI',sans-serif; }
.card { background:rgba(255,255,255,0.05); backdrop-filter:blur(20px); border:1px solid rgba(255,255,255,0.1); border-radius:20px; padding:40px; width:100%; max-width:420px; box-shadow:0 25px 50px rgba(0,0,0,0.5); }
.logo { text-align:center; margin-bottom:30px; }
.logo h1 { color:#e94560; font-size:24px; font-weight:800; letter-spacing:2px; }
.logo p { color:rgba(255,255,255,0.5); font-size:12px; margin-top:4px; }
.form-group { margin-bottom:20px; }
label { display:block; color:rgba(255,255,255,0.7); font-size:13px; margin-bottom:8px; font-weight:500; }
input { width:100%; padding:14px 16px; background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.15); border-radius:10px; color:#fff; font-size:15px; outline:none; transition:all 0.3s; }
input:focus { border-color:#e94560; background:rgba(255,255,255,0.12); }
.btn { width:100%; padding:14px; background:linear-gradient(135deg,#e94560,#c62a47); border:none; border-radius:10px; color:#fff; font-size:16px; font-weight:700; cursor:pointer; letter-spacing:1px; transition:all 0.3s; }
.btn:hover { transform:translateY(-2px); box-shadow:0 10px 25px rgba(233,69,96,0.4); }
.error { background:rgba(233,69,96,0.2); border:1px solid rgba(233,69,96,0.5); color:#ff6b8a; padding:12px; border-radius:8px; margin-bottom:20px; font-size:14px; text-align:center; }
.badges { display:flex; gap:8px; justify-content:center; margin-top:24px; flex-wrap:wrap; }
.badge { background:rgba(255,255,255,0.08); color:rgba(255,255,255,0.5); padding:4px 10px; border-radius:20px; font-size:11px; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <h1>🏢 SAI ENTERPRISES</h1>
    <p>Order Management System</p>
  </div>
  {% if error %}
  <div class="error">⚠️ {{ error }}</div>
  {% endif %}
  <form method="POST">
    <div class="form-group">
      <label>Username</label>
      <input type="text" name="username" placeholder="Enter username" required autofocus>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" name="password" placeholder="Enter password" required>
    </div>
    <button type="submit" class="btn">LOGIN →</button>
  </form>
  <div class="badges">
    <span class="badge">📦 Meesho</span>
    <span class="badge">🛒 Flipkart</span>
    <span class="badge">📬 Amazon</span>
    <span class="badge">🚚 Shadowfax</span>
    <span class="badge">📮 Delhivery</span>
  </div>
</div>
</body>
</html>
